server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-payment-service}/${DB_NAME:payment_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://auth-service:8081}

logging:
  level:
    com.example.payment: DEBUG
    ru.job4j.payment: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      livenessState:
        enabled: true
      readinessState:
        enabled: true
